services:

  kafka:
    image: apache/kafka:4.1.1
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
     test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --list --bootstrap-server localhost:9092"]
     interval: 10s
     timeout: 10s
     retries: 10
     start_period: 30s

  kafka-init:
    image: apache/kafka:4.1.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Creating Kafka topics..."

        /opt/kafka/bin/kafka-topics.sh \
          --create \
          --if-not-exists \
          --topic order-created \
          --bootstrap-server kafka:9092 \
          --partitions 1 \
          --replication-factor 1

        /opt/kafka/bin/kafka-topics.sh \
          --create \
          --if-not-exists \
          --topic inventory-reserved \
          --bootstrap-server kafka:9092 \
          --partitions 1 \
          --replication-factor 1

        /opt/kafka/bin/kafka-topics.sh \
          --create \
          --if-not-exists \
          --topic process-payment \
          --bootstrap-server kafka:9092 \
          --partitions 1 \
          --replication-factor 1

        /opt/kafka/bin/kafka-topics.sh \
          --create \
          --if-not-exists \
          --topic payment-succeeded \
          --bootstrap-server kafka:9092 \
          --partitions 1 \
          --replication-factor 1

        /opt/kafka/bin/kafka-topics.sh \
          --create \
          --if-not-exists \
          --topic payment-failed \
          --bootstrap-server kafka:9092 \
          --partitions 1 \
          --replication-factor 1

        /opt/kafka/bin/kafka-topics.sh \
          --create \
          --if-not-exists \
          --topic payment-dead-letter \
          --bootstrap-server kafka:9092 \
          --partitions 1 \
          --replication-factor 1

        /opt/kafka/bin/kafka-topics.sh \
          --create \
          --if-not-exists \
          --topic order-completed \
          --bootstrap-server kafka:9092 \
          --partitions 1 \
          --replication-factor 1

        /opt/kafka/bin/kafka-topics.sh \
          --create \
          --if-not-exists \
          --topic notification-sent \
          --bootstrap-server kafka:9092 \
          --partitions 1 \
          --replication-factor 1

        echo "Kafka topics initialized successfully."

  order-service:
    build:
      context: .
      dockerfile: OrderModule/Dockerfile
    ports:
      - "5025:8080"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    environment:
      Kafka__BootstrapServers: kafka:9092
      ASPNETCORE_HTTP_PORTS: 8080

  inventory-service:
    build:
      context: .
      dockerfile: InventoryModule/Dockerfile
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      Kafka__BootstrapServers: kafka:9092

  payment-service:
    build:
      context: .
      dockerfile: PaymentModule/Dockerfile
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      Kafka__BootstrapServers: kafka:9092

  notification-service:
    build:
      context: .
      dockerfile: NotificationModule/Dockerfile
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      Kafka__BootstrapServers: kafka:9092

  benchmark-service:
    build:
      context: .
      dockerfile: BenchmarkModule/Dockerfile
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      order-service:
        condition: service_healthy
    environment:
      Kafka__BootstrapServers: kafka:9092

volumes:
 kafka_data: